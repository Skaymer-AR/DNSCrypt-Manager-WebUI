name: Diagnose prerelease import payloads

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-import.yml'
      - 'import-assets/**'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false
      - name: Decode and report
        shell: bash
        run: |
          set -u
          cat import-assets/wip3gz-part-00 import-assets/wip3gz-part-01 import-assets/wip3gz-part-02 > /tmp/wip3.b64
          base64 --decode import-assets/wip3gz-part-03-fixed.b64 >> /tmp/wip3.b64
          cat import-assets/wip3gz-part-04 import-assets/wip3gz-part-05 import-assets/wip3gz-part-06 import-assets/wip3gz-part-07 import-assets/wip3gz-part-08 import-assets/wip3gz-part-09 >> /tmp/wip3.b64
          echo '--- input sizes ---'
          wc -c /tmp/wip3.b64 import-assets/rc22-part-*.b64 import-assets/v03-part-*.b64
          echo '--- decode WIP3 ---'
          base64 --decode /tmp/wip3.b64 | gzip -dc > /tmp/wip3.patch
          echo "wip3_decode_rc=$?"
          echo '--- decode RC2.2 ---'
          cat import-assets/rc22-part-*.b64 | base64 --decode > /tmp/rc22.patch
          echo "rc22_decode_rc=$?"
          echo '--- decode v0.3 ---'
          cat import-assets/v03-part-*.b64 | base64 --decode > /tmp/v03.patch
          echo "v03_decode_rc=$?"
          echo '--- resulting hashes ---'
          sha256sum /tmp/wip3.patch /tmp/rc22.patch /tmp/v03.patch
          echo '--- commit counts ---'
          grep -c '^From [0-9a-f]\{40\} ' /tmp/wip3.patch || true
          grep -c '^From [0-9a-f]\{40\} ' /tmp/rc22.patch || true
          grep -c '^From [0-9a-f]\{40\} ' /tmp/v03.patch || true
