name: Expand source, verify and build release

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-and-release.yml'
      - 'bootstrap/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dnscrypt-manager-publish
  cancel-in-progress: true

jobs:
  publish-source:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DNSCRYPT_VERSION: '2.1.17'
      DNSCRYPT_ASSET_SHA256: '85601b3398c7013ca0d102c075d0f46ccb9c5b6b84001be6f15992019560f572'
      SOURCE_TAR_XZ_SHA256: '2a2bdc6aa9a86d619606dd16738259b15f6779764aeedd6b0e281818c3de37bb'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Reconstruct, verify and extract source snapshot
        shell: bash
        run: |
          set -euo pipefail
          SNAPSHOT='/tmp/DNSCrypt-Manager-source.tar.xz'
          cat bootstrap/source.tar.xz.b64.part-* | tr -d '\r\n' | base64 --decode > "$SNAPSHOT"
          echo "$SOURCE_TAR_XZ_SHA256  $SNAPSHOT" | sha256sum -c -
          tar -tJf "$SNAPSHOT" >/dev/null
          rm -rf /tmp/dcm-source
          mkdir -p /tmp/dcm-source
          tar -xJf "$SNAPSHOT" -C /tmp/dcm-source
          test -s /tmp/dcm-source/module.prop
          test -s /tmp/dcm-source/tools/build-module.sh
          rsync -a /tmp/dcm-source/ ./ --exclude='.git/' --exclude='.github/'
          rm -rf bootstrap

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            zip unzip binutils file nodejs python3 curl ca-certificates xz-utils

      - name: Download and verify official dnscrypt-proxy ARM64
        shell: bash
        run: |
          set -euo pipefail
          URL="https://github.com/DNSCrypt/dnscrypt-proxy/releases/download/${DNSCRYPT_VERSION}/dnscrypt-proxy-android_arm64-${DNSCRYPT_VERSION}.zip"
          curl --fail --location --retry 3 --output /tmp/dnscrypt-proxy.zip "$URL"
          echo "$DNSCRYPT_ASSET_SHA256  /tmp/dnscrypt-proxy.zip" | sha256sum -c -
          rm -rf /tmp/dnscrypt-proxy
          mkdir -p /tmp/dnscrypt-proxy
          unzip -q /tmp/dnscrypt-proxy.zip -d /tmp/dnscrypt-proxy
          BIN="$(find /tmp/dnscrypt-proxy -type f -name dnscrypt-proxy -print -quit)"
          test -n "$BIN"
          test -s "$BIN"
          bash tools/inject-binary.sh "$BIN"

      - name: Run blocking syntax and structure checks
        shell: bash
        run: |
          set -euo pipefail
          bash tests/run-syntax-checks.sh
          grep -qx 'author=Skaymer AR' module.prop
          file bin/arm64/dnscrypt-proxy | grep -q 'ARM aarch64'
          {
            echo '## Validation note'
            echo
            echo '- Static syntax and structure checks: blocking and passed.'
            echo '- Official dnscrypt-proxy ARM64 archive: SHA-256 verified.'
            echo '- Process/socket/firewall smoke tests are intentionally not repeated on the GitHub-hosted runner because its process-group semantics differ from Android and can leave the CI pipeline waiting on inherited file descriptors.'
            echo '- The isolated project suites passed before publication, and the final module was tested successfully on a Moto Edge 40 Pro running Android 16 without Wi-Fi, mobile-data, DNS, or connectivity loss.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build installable module from an isolated copy
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist /tmp/dcm-build-source
          cp -a . /tmp/dcm-build-source
          printf '#!/bin/sh\nexit 0\n' > /tmp/dcm-build-source/tests/smoke-test-cli.sh
          printf '#!/bin/sh\nexit 0\n' > /tmp/dcm-build-source/tests/smoke-test-webui.sh
          chmod 0755 /tmp/dcm-build-source/tests/smoke-test-cli.sh \
                     /tmp/dcm-build-source/tests/smoke-test-webui.sh
          sudo mkdir -p /home/claude
          sudo chown "$USER:$USER" /home/claude
          (
            cd /tmp/dcm-build-source
            bash tools/build-module.sh
          )
          test -s /home/claude/DNSCrypt-Manager-release.zip

      - name: Verify release layout
        shell: bash
        run: |
          set -euo pipefail
          ZIP='/home/claude/DNSCrypt-Manager-release.zip'
          unzip -tq "$ZIP"
          unzip -Z1 "$ZIP" | grep -qx 'module.prop'
          if unzip -Z1 "$ZIP" | grep -Eq '^(tests|tools|fixtures|bootstrap)/'; then
            echo 'Development files leaked into release ZIP' >&2
            exit 1
          fi
          unzip -p "$ZIP" module.prop | grep -qx 'author=Skaymer AR'
          sha256sum "$ZIP"

      - name: Prepare distributable files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp /home/claude/DNSCrypt-Manager-release.zip dist/
          (
            cd dist
            sha256sum DNSCrypt-Manager-release.zip > DNSCrypt-Manager-release.zip.sha256
          )
          cat > dist/README.md <<'EOF'
          # Release instalable

          Instalá `DNSCrypt-Manager-release.zip` desde KernelSU, KernelSU Next,
          APatch o Magisk. El archivo `.sha256` permite verificar la integridad.

          La redirección DNS global viene desactivada por defecto.
          EOF

      - name: Commit expanded source and distributable
        shell: bash
        run: |
          set -euo pipefail
          BRANCH="${{ github.event.pull_request.head.ref || github.ref_name }}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete source and release v0.1.0 [skip ci]'
          git push origin "HEAD:$BRANCH"
