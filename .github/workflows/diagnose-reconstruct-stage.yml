name: Diagnose exact reconstruction stage

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-reconstruct-stage.yml'
      - 'tools/publish-parts/00-reconstruct.sh'
      - 'import-assets/rc22-part00-exact-500-*.b64'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run reconstruction and capture every command
        shell: bash
        run: |
          set +e
          mkdir -p /tmp/report /tmp/dcm-publish "$RUNNER_TEMP/releases"
          cp tools/publish-parts/00-reconstruct.sh /tmp/dcm-publish/
          chmod 0755 /tmp/dcm-publish/00-reconstruct.sh
          bash -x /tmp/dcm-publish/00-reconstruct.sh > /tmp/report/reconstruct.log 2>&1
          rc=$?
          printf 'exit_code=%s\n' "$rc" > /tmp/report/status.txt
          tail -120 /tmp/report/reconstruct.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: exact-reconstruction-diagnostic
          path: /tmp/report
          if-no-files-found: error
