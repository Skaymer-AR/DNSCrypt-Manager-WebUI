name: Publish preliminary v0.2.0 and v0.3.0

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/publish-preliminary-v020-v030.yml'
      - 'import-assets/**'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: publish-preliminary-v020-v030
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout publication branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify source inputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'Skaymer AR'
          git config user.email 'skaymer@users.noreply.github.com'
          git fetch origin main feature/security-v0.2.0 --tags

          cat import-assets/wip3gz-part-* | base64 --decode | gzip -dc > /tmp/wip3.patch
          cat import-assets/rc22-part-* | base64 --decode > /tmp/rc22.patch
          cat import-assets/v03-part-*  | base64 --decode > /tmp/v03.patch

          cp import-assets/RELEASE_NOTES_RC22.md /tmp/RELEASE_NOTES_RC22.md
          cp import-assets/RELEASE_NOTES_V03.md /tmp/RELEASE_NOTES_V03.md
          cp import-assets/AUDIT_RC2.2.md /tmp/AUDIT_SOURCE_RC2.2.md
          cp import-assets/TEST_RESULTS_RC2.2.md /tmp/TEST_RESULTS_RC2.2.md

          test -s /tmp/wip3.patch
          test -s /tmp/rc22.patch
          test -s /tmp/v03.patch
          test "$(grep -c '^From [0-9a-f]\{40\} ' /tmp/wip3.patch)" -eq 21
          test "$(grep -c '^From [0-9a-f]\{40\} ' /tmp/rc22.patch)" -eq 3
          test "$(grep -c '^From [0-9a-f]\{40\} ' /tmp/v03.patch)" -eq 4

          echo '8ed021ed038d7dd7f0c0c8f5a55ff1ffbbc365087242051ded8592c7ab53efae  /tmp/wip3.patch' | sha256sum -c -
          echo '70e9b4a8fcbc7992575219f01c1b9ee9beae548161603ba7ce9b4eccbca4bb86  /tmp/rc22.patch' | sha256sum -c -
          echo 'a6fb245395ebb4d93e4d46bfb26879b95def90a77b0751330affe9f03e0c869a  /tmp/v03.patch' | sha256sum -c -

      - name: Reconstruct v0.2.0-RC2.2 branch
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B pre-release/v0.2.0-rc2.2 bd2e0ab28922b3ed067f4a3c183a77fca714c243
          git am -3 /tmp/wip3.patch
          git am -3 /tmp/rc22.patch

          grep -qx 'version=v0.2.0-RC2.2' module.prop
          grep -qx 'versionCode=204' module.prop
          grep -qx 'author=Skaymer AR' module.prop

          mkdir -p docs
          cp /tmp/RELEASE_NOTES_RC22.md docs/PRE_RELEASE_STATUS.md

          python3 - <<'PY'
          from pathlib import Path
          p = Path('README.md')
          warning = (
              '> [!WARNING]\n'
              '> **PRELIMINARY / TESTING:** v0.2.x is not stable. Disable BindHosts, reboot, '
              'and only then enable DNSCrypt Manager. Running both can cause loss of connectivity '
              'or bootloop. KernelSU Next may require Hybrid Mount + reboot. Stable status begins '
              'at v1.0.0.\n\n'
          )
          text = p.read_text(encoding='utf-8')
          if 'PRELIMINARY / TESTING' not in text:
              p.write_text(warning + text, encoding='utf-8')
          PY

          git add README.md docs/PRE_RELEASE_STATUS.md
          if ! git diff --cached --quiet; then
            git commit -m 'docs(rc2.2): mark preliminary status and BindHosts bootloop warning'
          fi
          git push --force origin HEAD:refs/heads/pre-release/v0.2.0-rc2.2

      - name: Test and build v0.2.0-RC2.2
        shell: bash
        run: |
          set -euo pipefail
          bash tests/run-syntax-checks.sh
          bash tests/smoke-test-cli.sh
          bash tests/smoke-test-catalog.sh
          bash tests/smoke-test-environment-v030.sh

          mkdir -p "$RUNNER_TEMP/releases"
          DCM_SKIP_TESTS=1 \
            DCM_OUTPUT="$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip" \
            bash tools/build-module.sh

          unzip -t "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip"
          unzip -p "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip" module.prop | grep -qx 'version=v0.2.0-RC2.2'
          unzip -p "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip" module.prop | grep -qx 'versionCode=204'

          sha256sum "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip" \
            > "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip.sha256"
          cp /tmp/rc22.patch "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2.patch"
          cp /tmp/AUDIT_SOURCE_RC2.2.md "$RUNNER_TEMP/releases/AUDIT_SOURCE_RC2.2.md"
          cp /tmp/TEST_RESULTS_RC2.2.md "$RUNNER_TEMP/releases/TEST_RESULTS_RC2.2.md"

          {
            echo 'DNSCrypt Manager v0.2.0-RC2.2 release build audit'
            echo
            cat "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip.sha256"
            echo 'unzip_test=ok'
            echo 'module_version=v0.2.0-RC2.2'
            echo 'module_version_code=204'
            echo 'release_status=prerelease_testing'
            echo 'bindhosts_must_be_disabled=true'
            echo 'stable_target=v1.0.0'
          } > "$RUNNER_TEMP/releases/AUDIT_RELEASE_RC2.2.txt"

      - name: Reconstruct v0.3.0 Checkpoint A branch
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B feature/v0.3.0-rc1 pre-release/v0.2.0-rc2.2
          git am -3 /tmp/v03.patch

          sed -i 's/^version=.*/version=v0.3.0-RC1-WIP-A/' module.prop
          sed -i 's/^versionCode=.*/versionCode=300/' module.prop
          sed -i 's/^description=.*/description=PREVIEW en pruebas: WebUI SPA e i18n sobre RC2.2. BindHosts debe estar desactivado; estable desde v1.0.0. KernelSU Next puede requerir Hybrid Mount./' module.prop

          mkdir -p docs
          cp /tmp/RELEASE_NOTES_V03.md docs/PRE_RELEASE_STATUS.md

          python3 - <<'PY'
          from pathlib import Path
          p = Path('README.md')
          warning = (
              '> [!CAUTION]\n'
              '> **v0.3.0-RC1-WIP-A is a development preview.** Disable BindHosts and reboot before '
              'enabling DNSCrypt Manager; running both can cause connectivity loss or bootloop. '
              'KernelSU Next may require Hybrid Mount + reboot. This project remains under test '
              'until v1.0.0.\n\n'
          )
          text = p.read_text(encoding='utf-8')
          if 'v0.3.0-RC1-WIP-A is a development preview' not in text:
              p.write_text(warning + text, encoding='utf-8')
          PY

          git add module.prop README.md docs/PRE_RELEASE_STATUS.md
          if ! git diff --cached --quiet; then
            git commit -m 'chore(v0.3): publish Checkpoint A as preliminary preview'
          fi
          git push --force origin HEAD:refs/heads/feature/v0.3.0-rc1

      - name: Test and build v0.3.0-RC1-WIP-A
        shell: bash
        run: |
          set -euo pipefail
          bash tests/run-syntax-checks.sh
          bash tests/smoke-test-webui.sh
          bash tests/smoke-test-i18n.sh
          node tests/smoke-test-webui-v030.cjs

          DCM_SKIP_TESTS=1 \
            DCM_OUTPUT="$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip" \
            bash tools/build-module.sh

          unzip -t "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip"
          unzip -p "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip" module.prop | grep -qx 'version=v0.3.0-RC1-WIP-A'
          unzip -p "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip" module.prop | grep -qx 'versionCode=300'

          sha256sum "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip" \
            > "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip.sha256"
          cp /tmp/v03.patch "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A.patch"
          cp WORK_PROGRESS_v0.3.md "$RUNNER_TEMP/releases/WORK_PROGRESS_v0.3.md"

          {
            echo 'DNSCrypt Manager v0.3.0-RC1-WIP-A release build audit'
            echo
            cat "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip.sha256"
            echo 'unzip_test=ok'
            echo 'module_version=v0.3.0-RC1-WIP-A'
            echo 'module_version_code=300'
            echo 'release_status=development_preview'
            echo 'bindhosts_must_be_disabled=true'
            echo 'stable_target=v1.0.0'
          } > "$RUNNER_TEMP/releases/AUDIT_RELEASE_V03_WIP_A.txt"

      - name: Publish and verify preliminary releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git tag -f v0.2.0-rc2.2 pre-release/v0.2.0-rc2.2
          git tag -f v0.3.0-rc1-wip-a feature/v0.3.0-rc1
          git push --force origin refs/tags/v0.2.0-rc2.2 refs/tags/v0.3.0-rc1-wip-a

          if gh release view v0.2.0-rc2.2 >/dev/null 2>&1; then
            gh release edit v0.2.0-rc2.2 \
              --title 'DNSCrypt Manager v0.2.0-RC2.2 (Preliminary)' \
              --notes-file /tmp/RELEASE_NOTES_RC22.md \
              --prerelease
          else
            gh release create v0.2.0-rc2.2 \
              --title 'DNSCrypt Manager v0.2.0-RC2.2 (Preliminary)' \
              --notes-file /tmp/RELEASE_NOTES_RC22.md \
              --prerelease
          fi

          gh release upload v0.2.0-rc2.2 \
            "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip" \
            "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip.sha256" \
            "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.2.0-RC2.2.patch" \
            "$RUNNER_TEMP/releases/AUDIT_SOURCE_RC2.2.md" \
            "$RUNNER_TEMP/releases/AUDIT_RELEASE_RC2.2.txt" \
            "$RUNNER_TEMP/releases/TEST_RESULTS_RC2.2.md" \
            --clobber

          if gh release view v0.3.0-rc1-wip-a >/dev/null 2>&1; then
            gh release edit v0.3.0-rc1-wip-a \
              --title 'DNSCrypt Manager v0.3.0-RC1-WIP-A (Preview)' \
              --notes-file /tmp/RELEASE_NOTES_V03.md \
              --prerelease
          else
            gh release create v0.3.0-rc1-wip-a \
              --title 'DNSCrypt Manager v0.3.0-RC1-WIP-A (Preview)' \
              --notes-file /tmp/RELEASE_NOTES_V03.md \
              --prerelease
          fi

          gh release upload v0.3.0-rc1-wip-a \
            "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip" \
            "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip.sha256" \
            "$RUNNER_TEMP/releases/DNSCrypt-Manager-v0.3.0-RC1-WIP-A.patch" \
            "$RUNNER_TEMP/releases/WORK_PROGRESS_v0.3.md" \
            "$RUNNER_TEMP/releases/AUDIT_RELEASE_V03_WIP_A.txt" \
            --clobber

          gh release view v0.2.0-rc2.2 --json url,isPrerelease,assets > "$RUNNER_TEMP/releases/VERIFY_RELEASE_RC2.2.json"
          gh release view v0.3.0-rc1-wip-a --json url,isPrerelease,assets > "$RUNNER_TEMP/releases/VERIFY_RELEASE_V03.json"

          python3 - <<'PY'
          import json, os
          root = os.environ['RUNNER_TEMP'] + '/releases/'
          checks = [
              ('VERIFY_RELEASE_RC2.2.json', 'DNSCrypt-Manager-v0.2.0-RC2.2-Preliminary.zip'),
              ('VERIFY_RELEASE_V03.json', 'DNSCrypt-Manager-v0.3.0-RC1-WIP-A-Preliminary.zip'),
          ]
          for meta_name, asset_name in checks:
              meta = json.load(open(root + meta_name, encoding='utf-8'))
              assert meta['isPrerelease'] is True, meta
              assets = {a['name'] for a in meta['assets']}
              assert asset_name in assets, (asset_name, assets)
              print(meta['url'])
          PY

      - name: Preserve build outputs as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preliminary-release-assets
          path: ${{ runner.temp }}/releases
          if-no-files-found: warn
