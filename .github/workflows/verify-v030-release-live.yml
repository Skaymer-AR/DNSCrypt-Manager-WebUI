name: Verify live v0.3.0-RC1 release

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/verify-v030-release-live.yml'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose public release and assets
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p /tmp/release-check /tmp/report
          {
            echo '=== gh release view ==='
            gh release view v0.3.0-rc1 --json url,isPrerelease,tagName,assets
            echo "release_view_rc=$?"
            echo '=== REST release by tag ==='
            gh api repos/${GITHUB_REPOSITORY}/releases/tags/v0.3.0-rc1
            echo "release_api_rc=$?"
          } > /tmp/report/diagnostic.txt 2>&1

          gh release view v0.3.0-rc1 --json url,isPrerelease,tagName,assets > /tmp/report/release.json 2>/tmp/report/release-error.txt
          echo "$?" > /tmp/report/release-view.rc

          gh release download v0.3.0-rc1 \
            -p 'DNSCrypt-Manager-v0.3.0-RC1.zip' \
            -p 'DNSCrypt-Manager-v0.3.0-RC1.zip.sha256' \
            -p 'AUDIT_v0.3.0-RC1.md' \
            -p 'TEST_RESULTS_v0.3.0-RC1.md' \
            -D /tmp/release-check > /tmp/report/download.txt 2>&1
          echo "$?" > /tmp/report/download.rc

          ls -la /tmp/release-check > /tmp/report/downloaded-files.txt 2>&1
          if test -f /tmp/release-check/DNSCrypt-Manager-v0.3.0-RC1.zip.sha256; then
            (cd /tmp/release-check && sha256sum -c DNSCrypt-Manager-v0.3.0-RC1.zip.sha256) > /tmp/report/checksum.txt 2>&1
            echo "$?" > /tmp/report/checksum.rc
          fi
          if test -f /tmp/release-check/DNSCrypt-Manager-v0.3.0-RC1.zip; then
            unzip -tq /tmp/release-check/DNSCrypt-Manager-v0.3.0-RC1.zip > /tmp/report/unzip.txt 2>&1
            echo "$?" > /tmp/report/unzip.rc
            unzip -p /tmp/release-check/DNSCrypt-Manager-v0.3.0-RC1.zip module.prop | tr -d '\r' > /tmp/report/module.prop
            sha256sum /tmp/release-check/DNSCrypt-Manager-v0.3.0-RC1.zip > /tmp/report/zip.sha256
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: v030-live-release-diagnostic
          path: /tmp/report
          if-no-files-found: error
