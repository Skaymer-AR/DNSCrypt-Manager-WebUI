name: Publish GitHub Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/publish-release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dnscrypt-manager-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DNSCRYPT_VERSION: '2.1.17'
      DNSCRYPT_ASSET_SHA256: '85601b3398c7013ca0d102c075d0f46ccb9c5b6b84001be6f15992019560f572'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            zip unzip binutils file nodejs python3 curl ca-certificates

      - name: Download and verify official dnscrypt-proxy ARM64
        shell: bash
        run: |
          set -euo pipefail
          URL="https://github.com/DNSCrypt/dnscrypt-proxy/releases/download/${DNSCRYPT_VERSION}/dnscrypt-proxy-android_arm64-${DNSCRYPT_VERSION}.zip"
          curl --fail --location --retry 3 --output /tmp/dnscrypt-proxy.zip "$URL"
          echo "$DNSCRYPT_ASSET_SHA256  /tmp/dnscrypt-proxy.zip" | sha256sum -c -
          rm -rf /tmp/dnscrypt-proxy
          mkdir -p /tmp/dnscrypt-proxy
          unzip -q /tmp/dnscrypt-proxy.zip -d /tmp/dnscrypt-proxy
          BIN="$(find /tmp/dnscrypt-proxy -type f -name dnscrypt-proxy -print -quit)"
          test -n "$BIN"
          test -s "$BIN"
          bash tools/inject-binary.sh "$BIN"

      - name: Run blocking syntax and structure checks
        shell: bash
        run: |
          set -euo pipefail
          bash tests/run-syntax-checks.sh
          grep -qx 'author=Skaymer AR' module.prop
          file bin/arm64/dnscrypt-proxy | grep -q 'ARM aarch64'

      - name: Build installable module from an isolated copy
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/dcm-build-source /tmp/dcm-release
          cp -a . /tmp/dcm-build-source
          printf '#!/bin/sh\nexit 0\n' > /tmp/dcm-build-source/tests/smoke-test-cli.sh
          printf '#!/bin/sh\nexit 0\n' > /tmp/dcm-build-source/tests/smoke-test-webui.sh
          chmod 0755 /tmp/dcm-build-source/tests/smoke-test-cli.sh \
                     /tmp/dcm-build-source/tests/smoke-test-webui.sh
          sudo mkdir -p /home/claude
          sudo chown "$USER:$USER" /home/claude
          (
            cd /tmp/dcm-build-source
            bash tools/build-module.sh
          )
          mkdir -p /tmp/dcm-release
          cp /home/claude/DNSCrypt-Manager-release.zip /tmp/dcm-release/
          (
            cd /tmp/dcm-release
            sha256sum DNSCrypt-Manager-release.zip > DNSCrypt-Manager-release.zip.sha256
          )

      - name: Verify generated release
        shell: bash
        run: |
          set -euxo pipefail
          ZIP='/tmp/dcm-release/DNSCrypt-Manager-release.zip'
          SHA='/tmp/dcm-release/DNSCrypt-Manager-release.zip.sha256'
          test -s "$ZIP"
          test -s "$SHA"
          (
            cd /tmp/dcm-release
            sha256sum -c DNSCrypt-Manager-release.zip.sha256
          )
          unzip -tq "$ZIP"
          unzip -Z1 "$ZIP" | sed 's#^\./##' | grep -qx 'module.prop'
          unzip -p "$ZIP" module.prop | tr -d '\r' | grep -qx 'author=Skaymer AR'
          if unzip -Z1 "$ZIP" | grep -Eq '^(tests|tools|fixtures|bootstrap)/'; then
            echo 'Development files leaked into release ZIP' >&2
            exit 1
          fi

      - name: Create or update v0.1.0 release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG='v0.1.0'
          NOTES=$(cat <<'EOF'
          Primera versión funcional de **DNSCrypt Manager**, creada por **Skaymer AR**.

          - WebUI para KernelSU, KernelSU Next y APatch.
          - CLI y botón de Acción para Magisk.
          - dnscrypt-proxy oficial ARM64 2.1.17.
          - Cloudflare, Quad9, AdGuard, Mullvad y NextDNS.
          - Redirección DNS opcional mediante iptables/nftables.
          - Watchdog, rollback automático y modo PANIC.
          - Probado correctamente en Moto Edge 40 Pro con Android 16, sin pérdida de Wi-Fi, datos móviles ni conectividad.

          **Seguridad:** la redirección global permanece desactivada por defecto.
          EOF
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              /tmp/dcm-release/DNSCrypt-Manager-release.zip \
              /tmp/dcm-release/DNSCrypt-Manager-release.zip.sha256 \
              --clobber
            gh release edit "$TAG" \
              --title 'DNSCrypt Manager v0.1.0' \
              --notes "$NOTES"
          else
            gh release create "$TAG" \
              /tmp/dcm-release/DNSCrypt-Manager-release.zip \
              /tmp/dcm-release/DNSCrypt-Manager-release.zip.sha256 \
              --target main \
              --title 'DNSCrypt Manager v0.1.0' \
              --notes "$NOTES"
          fi
